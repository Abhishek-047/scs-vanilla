  <main>
    <!-- JOIN SECTION -->
    <section class="join section">
      <div class="container">
        <div class="join-grid">
          <!-- Info Column -->
          <div class="join-info sr d1">
            <span class="join-label">Join SCS</span>
            <h2 class="join-title">
              Become part of the<br>
              <span class="accent">community</span>
            </h2>
            <p class="join-text">
              Ready to take your cybersecurity skills to the next level? 
              Join our community of passionate security professionals, 
              researchers, and enthusiasts.
            </p>
            
            <div class="join-socials">
              <a href="#" class="social-link" title="Discord">

                </svg>
              </a>
              <a href="#" class="social-link" title="GitHub">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">

                </svg>
              </a>
              <a href="#" class="social-link" title="X/Twitter">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                  <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
              </a>
            </div>
            
            <div class="join-contact-info">
              <div class="join-contact-item">
                <div class="join-contact-icon">
                  <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/></svg>
                </div>
                <span class="join-contact-text">contact@scs-security.org</span>
              </div>
            </div>
          </div>
          
          <!-- Form Column -->
          <div class="join-form-container sr d2">
            <form id="join-form" class="join-form">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="alias">Alias / Handle *</label>
                  <input type="text" id="alias" class="input-field" placeholder="Your alias" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="email">Email *</label>
                  <input type="email" id="email" class="input-field" placeholder="your@email.com" required>
                </div>
              </div>
              
              <div class="form-group">
                <label class="form-label" for="interest">Primary Interest *</label>
                <select id="interest" class="select-field" required>
                  <option value="">Select an option...</option>
                  <option value="web">Web Security</option>
                  <option value="network">Network Security</option>
                  <option value="malware">Malware Analysis</option>
                  <option value="re">Reverse Engineering</option>
                  <option value="osint">OSINT</option>
                  <option value="ctf">CTF Competitions</option>
                  <option value="redteam">Red Teaming</option>
                </select>
              </div>
              
              <div class="form-group">
                <label class="form-label" for="message">Message</label>
                <textarea id="message" class="textarea-field" placeholder="Tell us about yourself, your experience, and why you want to join..."></textarea>
              </div>
              
              <button type="submit" id="join-btn" class="btn-tx state-idle">
                ⟩ TRANSMIT APPLICATION
              </button>
              
              <div class="form-message"></div>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/form.js"></script>
</body>
</html>
